appId: com.trinity.app
productName: Trinity
copyright: Copyright © 2024

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64]
  icon: build/icon.icns
  darkModeSupport: true
  hardenedRuntime: true

dmg:
  title: Trinity
  iconSize: 80
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

directories:
  output: dist-electron
  buildResources: build

files:
  - electron/dist/**/*
  - package.json
  - "!node_modules"
  - "!src"
  - "!backend"
  - "!.next"
  - "!public"

extraResources:
  # Elixir release (self-contained with ERTS)
  - from: backend/_build/prod/rel/trinity
    to: elixir-release
    filter:
      - "**/*"
  # Next.js standalone server
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  # Next.js static assets
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  # Python scripts
  - from: backend/scripts
    to: scripts
    filter:
      - "**/*"
